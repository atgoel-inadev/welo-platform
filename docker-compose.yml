services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: welo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welo_platform
    ports:
      - "${POSTGRES_HOST_PORT:-6432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - welo-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: welo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-7379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - welo-network

  # Kafka Message Broker (KRaft mode - no Zookeeper needed)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: welo-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT:-10092}:9092"
      - "${KAFKA_CONTROLLER_HOST_PORT:-10093}:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - welo-network

  # Workflow Engine Service
  workflow-engine:
    build:
      context: .
      dockerfile: ./docker/workflow-engine/Dockerfile
    container_name: welo-workflow-engine
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: workflow-engine
      KAFKA_GROUP_ID: workflow-engine-group
    ports:
      - "${WORKFLOW_ENGINE_HOST_PORT:-4001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - welo-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: ./docker/auth-service/Dockerfile
    container_name: welo-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRES_IN: 1h
      REFRESH_TOKEN_EXPIRES_IN: 7d
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: auth-service
      KAFKA_GROUP_ID: auth-service-group
    ports:
      - "${AUTH_SERVICE_HOST_PORT:-4002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - welo-network

  # Task Management Service
  task-management:
    build:
      context: .
      dockerfile: ./docker/task-management/Dockerfile
    container_name: welo-task-management
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: task-management
      KAFKA_GROUP_ID: task-management-group
      PLUGIN_SECRETS_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
    ports:
      - "${TASK_MANAGEMENT_HOST_PORT:-4003}:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - welo-network

  # Annotation & Quality Assurance Service
  annotation-qa-service:
    build:
      context: .
      dockerfile: ./docker/annotation-qa-service/Dockerfile
    container_name: welo-annotation-qa-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: annotation-qa-service
      KAFKA_GROUP_ID: annotation-qa-service-group
      WORKFLOW_ENGINE_URL: http://workflow-engine:3001/api/v1
    ports:
      - "${ANNOTATION_QA_HOST_PORT:-4005}:3005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      workflow-engine:
        condition: service_started
    networks:
      - welo-network

  # Project Management Service
  project-management:
    build:
      context: .
      dockerfile: ./docker/project-management/Dockerfile
    container_name: welo-project-management
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: project-management
      KAFKA_GROUP_ID: project-management-group
      MEDIA_FILES_PATH: /app/media
      ENABLE_DIRECTORY_SCAN: "true"  # Enable directory scan mode for demo
      PLUGIN_SECRETS_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
    ports:
      - "${PROJECT_MANAGEMENT_HOST_PORT:-4004}:3004"
    volumes:
      - ../welo-platform-ui/public/uploads:/app/media  # Read-write for directory scan mode
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - welo-network

  # ── Nginx API Gateway ─────────────────────────────────────────────
  # Single entry point on port 80. Routes by path prefix:
  #   /auth/*           → auth-service:3002
  #   /tasks/*          → task-management:3003
  #   /projects/*       → project-management:3004
  #   /workflows/*      → workflow-engine:3001
  #   /annotation-qa/*  → annotation-qa-service:3005
  nginx:
    image: nginx:1.27-alpine
    container_name: welo-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      task-management:
        condition: service_healthy
      project-management:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
      annotation-qa-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - welo-network

  # ── Welo Platform UI (React SPA) ──────────────────────────────────
  welo-ui:
    build:
      context: ../welo-platform-ui
      dockerfile: Dockerfile
      args:
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL}
        VITE_TASK_MANAGEMENT_URL: ${VITE_TASK_MANAGEMENT_URL}
        VITE_PROJECT_MANAGEMENT_URL: ${VITE_PROJECT_MANAGEMENT_URL}
        VITE_WORKFLOW_ENGINE_URL: ${VITE_WORKFLOW_ENGINE_URL}
        VITE_ANNOTATION_QA_URL: ${VITE_ANNOTATION_QA_URL}
        VITE_API_URL: ${VITE_API_URL}
    container_name: welo-ui
    restart: unless-stopped
    ports:
      - "${UI_HOST_PORT:-5173}:80"
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - welo-network

  # ── Cloudflare Quick Tunnel ────────────────────────────────────────
  # Free, no account or signup needed.
  # Exposes nginx:80 → public HTTPS *.trycloudflare.com URL.
  # Get URL after startup:
  #   docker-compose logs cloudflared | grep trycloudflare
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: welo-cloudflared
    restart: unless-stopped
    command: --no-autoupdate tunnel --url http://nginx:80
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - welo-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local

networks:
  welo-network:
    driver: bridge
