services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: welo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welo_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - welo-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: welo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - welo-network

  # Kafka Message Broker (KRaft mode - no Zookeeper needed)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: welo-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - welo-network

  # ── Jaeger All-in-One (OpenTelemetry trace backend) ───────────────
  # OTLP HTTP receiver: :4318  (services send traces here)
  # OTLP gRPC receiver: :4317
  # Jaeger UI:          :16686 (browse traces at http://localhost:16686)
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: welo-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - welo-network

  # Workflow Engine Service
  workflow-engine:
    build:
      context: .
      dockerfile: ./docker/workflow-engine/Dockerfile
    container_name: welo-workflow-engine
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: workflow-engine
      KAFKA_GROUP_ID: workflow-engine-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: ./docker/auth-service/Dockerfile
    container_name: welo-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRES_IN: 1h
      REFRESH_TOKEN_EXPIRES_IN: 7d
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: auth-service
      KAFKA_GROUP_ID: auth-service-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # Task Management Service
  task-management:
    build:
      context: .
      dockerfile: ./docker/task-management/Dockerfile
    container_name: welo-task-management
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: task-management
      KAFKA_GROUP_ID: task-management-group
      PLUGIN_SECRETS_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # Annotation & Quality Assurance Service
  annotation-qa-service:
    build:
      context: .
      dockerfile: ./docker/annotation-qa-service/Dockerfile
    container_name: welo-annotation-qa-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: annotation-qa-service
      KAFKA_GROUP_ID: annotation-qa-service-group
      WORKFLOW_ENGINE_URL: http://workflow-engine:3001/api/v1
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      workflow-engine:
        condition: service_started
    networks:
      - welo-network

  # Project Management Service
  project-management:
    build:
      context: .
      dockerfile: ./docker/project-management/Dockerfile
    container_name: welo-project-management
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: project-management
      KAFKA_GROUP_ID: project-management-group
      MEDIA_FILES_PATH: /app/media
      ENABLE_DIRECTORY_SCAN: "true"  # Enable directory scan mode for demo
      PLUGIN_SECRETS_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3004:3004"
    volumes:
      - ../welo-platform-ui/public/uploads:/app/media  # Read-write for directory scan mode
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # ── Nginx API Gateway ─────────────────────────────────────────────
  # Single entry point on port 80. Routes by path prefix:
  #   /auth/*           → auth-service:3002
  #   /tasks/*          → task-management:3003
  #   /projects/*       → project-management:3004
  #   /workflows/*      → workflow-engine:3001
  #   /annotation-qa/*  → annotation-qa-service:3005
  nginx:
    image: nginx:1.27-alpine
    container_name: welo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      task-management:
        condition: service_healthy
      project-management:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
      annotation-qa-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - welo-network

  # ── Cloudflare Quick Tunnel ────────────────────────────────────────
  # Free, no account or signup needed.
  # Exposes nginx:80 → public HTTPS *.trycloudflare.com URL.
  # Get URL after startup:
  #   docker-compose logs cloudflared | grep trycloudflare
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: welo-cloudflared
    restart: unless-stopped
    command: --no-autoupdate tunnel --url http://nginx:80
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - welo-network

  # ── File Storage Service (port 3006) ──────────────────────────────
  file-storage-service:
    build:
      context: .
      dockerfile: ./docker/file-storage-service/Dockerfile
    container_name: welo-file-storage-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      FILE_STORAGE_SERVICE_PORT: 3006
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: file-storage-service
      KAFKA_GROUP_ID: file-storage-group
      STORAGE_TYPE: local
      MEDIA_FILES_PATH: /app/media
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3006:3006"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # ── Export Service (port 3007) ─────────────────────────────────────
  export-service:
    build:
      context: .
      dockerfile: ./docker/export-service/Dockerfile
    container_name: welo-export-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      EXPORT_SERVICE_PORT: 3007
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: export-service
      KAFKA_GROUP_ID: export-group
      EXPORT_DIR: /app/exports
      EXPORT_EXPIRY_DAYS: 30
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3007:3007"
    volumes:
      - export_data:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # ── Notification Service (port 3008) ──────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: ./docker/notification-service/Dockerfile
    container_name: welo-notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NOTIFICATION_SERVICE_PORT: 3008
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: notification-service
      KAFKA_GROUP_ID: notification-group
      EMAIL_PROVIDER: console
      FROM_EMAIL: noreply@welo.ai
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3008:3008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # ── Analytics Service (port 3009) ─────────────────────────────────
  analytics-service:
    build:
      context: .
      dockerfile: ./docker/analytics-service/Dockerfile
    container_name: welo-analytics-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ANALYTICS_SERVICE_PORT: 3009
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      ANALYTICS_DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: analytics-service
      KAFKA_GROUP_ID: analytics-group
      ANALYTICS_CACHE_TTL_SECONDS: 300
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

  # ── Audit Service (port 3010) ──────────────────────────────────────
  audit-service:
    build:
      context: .
      dockerfile: ./docker/audit-service/Dockerfile
    container_name: welo-audit-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUDIT_SERVICE_PORT: 3010
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: welo_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: audit-service
      KAFKA_GROUP_ID: audit-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - welo-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  media_data:
    driver: local
  export_data:
    driver: local

networks:
  welo-network:
    driver: bridge
