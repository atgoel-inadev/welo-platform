upstream auth_service       { server auth-service:3002; }
upstream task_management    { server task-management:3003; }
upstream project_management { server project-management:3004; }
upstream workflow_engine    { server workflow-engine:3001; }
upstream annotation_qa      { server annotation-qa-service:3005; }

server {
    listen 80;
    server_name _;

    # ── Compression ────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # ── CORS — applied to every response ──────────────────────────
    add_header 'Access-Control-Allow-Origin'  '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role' always;
    add_header 'Access-Control-Max-Age'       '86400' always;

    # Preflight short-circuit (no upstream hit)
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ── Gateway health check ───────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx","services":["auth","tasks","projects","workflows","annotation-qa"]}';
        add_header Content-Type application/json;
    }

    # ── Auth Service ───────────────────────────────────────────────
    # /auth/api/v1/auth/login  →  auth-service:3002/api/v1/auth/login
    location /auth/ {
        rewrite ^/auth(/.*)?$ $1 break;
        proxy_pass         http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Task Management (tasks + batches) ─────────────────────────
    # /tasks/api/v1/tasks/*  →  task-management:3003/api/v1/tasks/*
    location /tasks/ {
        rewrite ^/tasks(/.*)?$ $1 break;
        proxy_pass         http://task_management;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Larger body for file uploads
        client_max_body_size 50m;
    }

    # ── Project Management ─────────────────────────────────────────
    # /projects/api/v1/projects/*  →  project-management:3004/api/v1/projects/*
    location /projects/ {
        rewrite ^/projects(/.*)?$ $1 break;
        proxy_pass         http://project_management;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # ── Workflow Engine ────────────────────────────────────────────
    # /workflows/api/v1/*  →  workflow-engine:3001/api/v1/*
    location /workflows/ {
        rewrite ^/workflows(/.*)?$ $1 break;
        proxy_pass         http://workflow_engine;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Annotation QA Service ──────────────────────────────────────
    # /annotation-qa/api/v1/*  →  annotation-qa-service:3005/api/v1/*
    location /annotation-qa/ {
        rewrite ^/annotation-qa(/.*)?$ $1 break;
        proxy_pass         http://annotation_qa;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Default 404 ────────────────────────────────────────────────
    location / {
        return 404 '{"error":"Not found","routes":["/auth/","/tasks/","/projects/","/workflows/","/annotation-qa/","/health"]}';
        add_header Content-Type application/json;
    }
}
