upstream auth_service       { server auth-service:3002; }
upstream task_management    { server task-management:3003; }
upstream project_management { server project-management:3004; }
upstream workflow_engine    { server workflow-engine:3001; }
upstream annotation_qa      { server annotation-qa-service:3005; }

map $request_method $cors_preflight {
    OPTIONS  "true";
    default  "";
}

server {
    listen 80;
    server_name _;

    # ── Compression ────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # ── Gateway health check ───────────────────────────────────────
    location = /health {
        access_log off;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header Content-Type application/json always;
        return 200 '{"status":"ok","gateway":"nginx","services":["auth","tasks","projects","workflows","annotation-qa"]}';
    }

    # ── Auth Service ───────────────────────────────────────────────
    location /auth/ {
        if ($cors_preflight = "true") {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role';
            add_header 'Access-Control-Max-Age'       '86400';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        # Strip upstream CORS headers to prevent duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        rewrite ^/auth(/.*)?$ $1 break;
        proxy_pass         http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Task Management (tasks + batches) ─────────────────────────
    location /tasks/ {
        if ($cors_preflight = "true") {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role';
            add_header 'Access-Control-Max-Age'       '86400';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        rewrite ^/tasks(/.*)?$ $1 break;
        proxy_pass         http://task_management;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # ── Project Management ─────────────────────────────────────────
    location /projects/ {
        if ($cors_preflight = "true") {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role';
            add_header 'Access-Control-Max-Age'       '86400';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        rewrite ^/projects(/.*)?$ $1 break;
        proxy_pass         http://project_management;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # ── Workflow Engine ────────────────────────────────────────────
    location /workflows/ {
        if ($cors_preflight = "true") {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role';
            add_header 'Access-Control-Max-Age'       '86400';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        rewrite ^/workflows(/.*)?$ $1 break;
        proxy_pass         http://workflow_engine;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Annotation QA Service ──────────────────────────────────────
    location /annotation-qa/ {
        if ($cors_preflight = "true") {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role';
            add_header 'Access-Control-Max-Age'       '86400';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        proxy_hide_header 'Access-Control-Max-Age';

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, x-user-id, x-role' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        rewrite ^/annotation-qa(/.*)?$ $1 break;
        proxy_pass         http://annotation_qa;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Default 404 ────────────────────────────────────────────────
    location / {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header Content-Type application/json always;
        return 404 '{"error":"Not found","routes":["/auth/","/tasks/","/projects/","/workflows/","/annotation-qa/","/health"]}';
    }
}
