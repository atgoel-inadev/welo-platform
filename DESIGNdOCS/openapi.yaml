openapi: 3.0.3

info:
  title: Welo Data Annotation Platform API
  description: |
    RESTful API for the Welo Data Annotation Platform — a microservices monorepo.
    Each service runs independently on its own port. All services share the prefix `/api/v1`
    and accept/return JSON.

    ## Authentication
    All protected endpoints require a JWT Bearer token:
    ```
    Authorization: Bearer <access_token>
    ```

    ## Microservice Ports
    | Service | Port |
    |---------|------|
    | Workflow Engine | 3001 |
    | Auth Service | 3002 |
    | Task Management | 3003 |
    | Project Management | 3004 |
    | Annotation QA Service | 3005 |
    | File Storage Service | 3006 |
    | Export Service | 3007 |
    | Notification Service | 3008 |
    | Analytics Service | 3009 |
    | Audit Service | 3010 |

    In production all services sit behind a reverse proxy / API gateway.
    Swagger UI is available at `http://localhost:{port}/api` for each service.
  version: 1.0.0
  contact:
    name: Welo Platform Team

servers:
  - url: http://localhost:3001/api/v1
    description: Workflow Engine (local)
  - url: http://localhost:3002/api/v1
    description: Auth Service (local)
  - url: http://localhost:3003/api/v1
    description: Task Management (local)
  - url: http://localhost:3004/api/v1
    description: Project Management (local)
  - url: http://localhost:3005/api/v1
    description: Annotation QA Service (local)
  - url: http://localhost:3006/api/v1
    description: File Storage Service (local)
  - url: http://localhost:3007/api/v1
    description: Export Service (local)
  - url: http://localhost:3008/api/v1
    description: Notification Service (local)
  - url: http://localhost:3009/api/v1
    description: Analytics Service (local)
  - url: http://localhost:3010/api/v1
    description: Audit Service (local)

security:
  - BearerAuth: []

tags:
  - name: auth
    description: "Auth Service (port 3002) — login, registration, token refresh, user management"
  - name: workflows
    description: "Workflow Engine (port 3001) — workflow definitions and lifecycle"
  - name: workflow-instances
    description: "Workflow Engine (port 3001) — running XState workflow instances"
  - name: projects
    description: "Project Management (port 3004) — projects, configuration, team"
  - name: batches
    description: "Project Management (port 3004) — task batches within projects"
  - name: tasks
    description: "Task Management (port 3003) — annotation tasks, assignments, comments"
  - name: annotations
    description: "Annotation QA Service (port 3005) — annotation read/update"
  - name: reviews
    description: "Annotation QA Service (port 3005) — reviewer decisions"
  - name: quality-checks
    description: "Annotation QA Service (port 3005) — manual and automated QC"
  - name: files
    description: "File Storage Service (port 3006) — file upload and management"
  - name: exports
    description: "Export Service (port 3007) — data export jobs"
  - name: notifications
    description: "Notification Service (port 3008) — in-app notifications"
  - name: webhooks
    description: "Notification Service (port 3008) — outbound webhook registrations"
  - name: analytics
    description: "Analytics Service (port 3009) — dashboard, productivity, capacity"
  - name: audit-logs
    description: "Audit Service (port 3010) — immutable audit trail"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # AUTH SERVICE  (port 3002)
  # =========================================================================

  /auth/login:
    post:
      tags: [auth]
      summary: User login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [auth]
      summary: User registration
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenDto'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [auth]
      summary: User logout
      operationId: logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /auth/me:
    get:
      tags: [auth]
      summary: Get current user profile
      operationId: getCurrentUser
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/profile:
    patch:
      tags: [auth]
      summary: Update current user profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileDto'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /auth/password:
    patch:
      tags: [auth]
      summary: Change password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /auth/session:
    get:
      tags: [auth]
      summary: Validate session and get user info
      operationId: validateSession
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                        example: true
                      user:
                        $ref: '#/components/schemas/User'

  /auth/users:
    get:
      tags: [auth]
      summary: List all users
      operationId: listUsers
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Users list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
    post:
      tags: [auth]
      summary: Create a new user (admin only)
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/users/{id}:
    get:
      tags: [auth]
      summary: Get user by ID
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [auth]
      summary: Update user details
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [auth]
      summary: Delete a user
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # WORKFLOW ENGINE  (port 3001)
  # =========================================================================

  /workflows:
    post:
      tags: [workflows]
      summary: Create a new workflow
      operationId: createWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowDto'
      responses:
        '201':
          description: Workflow created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
    get:
      tags: [workflows]
      summary: List all workflows
      operationId: listWorkflows
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/WorkflowStatus'
        - name: isTemplate
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Workflows retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workflow'

  /workflows/{id}:
    get:
      tags: [workflows]
      summary: Get workflow by ID
      operationId: getWorkflow
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Workflow retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [workflows]
      summary: Update a workflow
      operationId: updateWorkflow
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowDto'
      responses:
        '200':
          description: Workflow updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
    delete:
      tags: [workflows]
      summary: Delete a workflow
      operationId: deleteWorkflow
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Workflow deleted successfully

  /workflows/{id}/validate:
    post:
      tags: [workflows]
      summary: Validate workflow definition
      operationId: validateWorkflow
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      isValid:
                        type: boolean
                      errors:
                        type: array
                        items:
                          type: string
                      warnings:
                        type: array
                        items:
                          type: string

  /workflows/{id}/simulate:
    post:
      tags: [workflows]
      summary: Simulate workflow execution
      operationId: simulateWorkflow
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateWorkflowDto'
      responses:
        '200':
          description: Simulation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true

  /workflows/{id}/visualization:
    get:
      tags: [workflows]
      summary: Get workflow visualization data
      operationId: getWorkflowVisualization
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Visualization data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      workflowId:
                        type: string
                        format: uuid
                      visualizationConfig:
                        type: object
                        additionalProperties: true
                      xstateDefinition:
                        type: object
                        additionalProperties: true
                      message:
                        type: string

  # Workflow Instances

  /workflow-instances:
    post:
      tags: [workflow-instances]
      summary: Create a workflow instance
      operationId: createWorkflowInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceDto'
      responses:
        '201':
          description: Instance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}:
    get:
      tags: [workflow-instances]
      summary: Get workflow instance
      operationId: getWorkflowInstance
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}/events:
    post:
      tags: [workflow-instances]
      summary: Send event to workflow instance
      operationId: sendWorkflowEvent
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEventDto'
      responses:
        '200':
          description: Event processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}/pause:
    post:
      tags: [workflow-instances]
      summary: Pause workflow instance
      operationId: pauseWorkflowInstance
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Instance paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}/resume:
    post:
      tags: [workflow-instances]
      summary: Resume workflow instance
      operationId: resumeWorkflowInstance
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Instance resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}/stop:
    post:
      tags: [workflow-instances]
      summary: Stop workflow instance
      operationId: stopWorkflowInstance
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Instance stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}/snapshot:
    get:
      tags: [workflow-instances]
      summary: Get workflow instance snapshot
      operationId: getWorkflowSnapshot
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Instance snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true

  /workflow-instances/{id}/restore:
    post:
      tags: [workflow-instances]
      summary: Restore workflow instance from snapshot
      operationId: restoreWorkflowInstance
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshotId:
                  type: string
      responses:
        '200':
          description: Instance restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'

  /workflow-instances/{id}/actors:
    get:
      tags: [workflow-instances]
      summary: Get child actors of workflow instance
      operationId: getWorkflowActors
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Child actors
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  # =========================================================================
  # PROJECT MANAGEMENT  (port 3004)
  # =========================================================================

  /projects:
    get:
      tags: [projects]
      summary: List all projects
      operationId: listProjects
      parameters:
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjects'
    post:
      tags: [projects]
      summary: Create a new project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectDto'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'

  /projects/{id}:
    get:
      tags: [projects]
      summary: Get project by ID
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Project retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [projects]
      summary: Update project
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectDto'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [projects]
      summary: Delete project (soft delete)
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}/status:
    patch:
      tags: [projects]
      summary: Update project status
      operationId: updateProjectStatus
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/ProjectStatus'
      responses:
        '200':
          description: Project status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'

  /projects/{id}/clone:
    post:
      tags: [projects]
      summary: Clone an existing project
      operationId: cloneProject
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newName]
              properties:
                newName:
                  type: string
                  example: Cloned Project
                copyTasks:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Project cloned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'

  /projects/{id}/statistics:
    get:
      tags: [projects]
      summary: Get project statistics
      operationId: getProjectStatistics
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStatistics'

  /projects/{id}/annotation-questions:
    get:
      tags: [projects]
      summary: Get annotation questions for a project
      operationId: getAnnotationQuestions
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Annotation questions retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnnotationQuestion'
    post:
      tags: [projects]
      summary: Add annotation questions to project
      operationId: addAnnotationQuestions
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [questions]
              properties:
                questions:
                  type: array
                  items:
                    $ref: '#/components/schemas/AnnotationQuestion'
      responses:
        '201':
          description: Questions added successfully

  /projects/{id}/annotation-questions/{questionId}:
    patch:
      tags: [projects]
      summary: Update a specific annotation question
      operationId: updateAnnotationQuestion
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Question updated
    delete:
      tags: [projects]
      summary: Delete an annotation question
      operationId: deleteAnnotationQuestion
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Question deleted

  /projects/{id}/workflow-configuration:
    get:
      tags: [projects]
      summary: Get workflow configuration for project
      operationId: getWorkflowConfiguration
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Workflow configuration retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowConfiguration'
    post:
      tags: [projects]
      summary: Configure workflow for project
      operationId: configureWorkflow
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigureWorkflowDto'
      responses:
        '201':
          description: Workflow configured

  /projects/{id}/workflow-configuration/annotators-per-task:
    patch:
      tags: [projects]
      summary: Update annotators per task count
      operationId: updateAnnotatorsPerTask
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [count]
              properties:
                count:
                  type: integer
                  example: 3
      responses:
        '200':
          description: Annotators per task updated

  /projects/{id}/workflow-configuration/review-levels:
    post:
      tags: [projects]
      summary: Add a review level to workflow
      operationId: addReviewLevel
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Review level added

  /projects/{id}/workflow-configuration/review-levels/{level}:
    delete:
      tags: [projects]
      summary: Remove a review level from workflow
      operationId: removeReviewLevel
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: level
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review level removed

