          description: Capacity metrics retrieved

  # =========================================================================
  # AUDIT SERVICE  (port 3010)
  # =========================================================================

  /audit-logs:
    get:
      tags: [audit-logs]
      summary: Query audit logs with filtering and pagination
      operationId: queryAuditLogs
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
            example: TASK
        - name: entityId
          in: query
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Audit logs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogs'

  /audit-logs/stats:
    get:
      tags: [audit-logs]
      summary: Get audit log statistics (action breakdown, entity breakdown, daily series)
      operationId: getAuditStats
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Audit statistics retrieved

  /audit-logs/entity/{type}/{id}:
    get:
      tags: [audit-logs]
      summary: Get full audit trail for a specific entity
      operationId: getEntityAuditTrail
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          description: Entity type e.g. TASK, BATCH, ANNOTATION
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entity audit trail retrieved

  /audit-logs/user/{userId}:
    get:
      tags: [audit-logs]
      summary: Get all audit actions by a specific user
      operationId: getUserAuditTrail
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: User audit trail retrieved

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from POST /auth/login

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

  responses:
    BadRequest:
      description: Bad request — validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized — missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict — resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    # -------------------------------------------------------------------------
    # Common / Shared
    # -------------------------------------------------------------------------

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: RESOURCE_NOT_FOUND
            message:
              type: string
              example: The requested resource was not found
            details:
              type: object
              additionalProperties: true
        metadata:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
            requestId:
              type: string
              format: uuid

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    # -------------------------------------------------------------------------
    # Auth / Users
    # -------------------------------------------------------------------------

    UserRole:
      type: string
      enum:
        - ADMIN
        - PROJECT_MANAGER
        - ANNOTATOR
        - REVIEWER
        - CUSTOMER
      example: ANNOTATOR

    UserStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - SUSPENDED
        - PENDING_VERIFICATION
      example: ACTIVE

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/User'

    PaginatedUsers:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            users:
              type: array
              items:
                $ref: '#/components/schemas/User'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8

    RegisterDto:
      type: object
      required: [email, password, firstName, lastName, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    RefreshTokenDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UpdateProfileDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        avatar:
          type: string
          format: uri

    ChangePasswordDto:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8

    CreateUserDto:
      allOf:
        - $ref: '#/components/schemas/RegisterDto'

    UpdateUserDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'

    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer
              description: Seconds until access token expires
            user:
              $ref: '#/components/schemas/User'

    # -------------------------------------------------------------------------
    # Workflows
    # -------------------------------------------------------------------------

    WorkflowStatus:
      type: string
      enum: [DRAFT, ACTIVE, ARCHIVED]
      example: ACTIVE

    Workflow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/WorkflowStatus'
        projectId:
          type: string
          format: uuid
        isTemplate:
          type: boolean
        xstateDefinition:
          type: object
          additionalProperties: true
        visualizationConfig:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkflowResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Workflow'

    CreateWorkflowDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Standard Annotation Workflow
        description:
          type: string
        projectId:
          type: string
          format: uuid
        isTemplate:
          type: boolean
          default: false
        xstateDefinition:
          type: object
          additionalProperties: true

    UpdateWorkflowDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/WorkflowStatus'
        xstateDefinition:
          type: object
          additionalProperties: true

    SimulateWorkflowDto:
      type: object
      properties:
        initialContext:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              payload:
                type: object
                additionalProperties: true

    # Workflow Instances

    InstanceResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            workflowId:
              type: string
              format: uuid
            state:
              type: string
            context:
              type: object
              additionalProperties: true
            status:
              type: string
              enum: [RUNNING, PAUSED, STOPPED, COMPLETED, ERROR]
            createdAt:
              type: string
              format: date-time

    CreateInstanceDto:
      type: object
      required: [workflowId]
      properties:
        workflowId:
          type: string
          format: uuid
        context:
          type: object
          additionalProperties: true
        entityId:
          type: string
          format: uuid
          description: ID of the task / project / etc. this instance is for

    SendEventDto:
      type: object
      required: [type]
      properties:
        type:
          type: string
          example: SUBMIT_ANNOTATION
        payload:
          type: object
          additionalProperties: true

    # -------------------------------------------------------------------------
    # Projects
    # -------------------------------------------------------------------------

    ProjectStatus:
      type: string
      enum: [DRAFT, ACTIVE, PAUSED, COMPLETED, ARCHIVED]
      example: ACTIVE

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        customerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProjectStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Project'

    PaginatedProjects:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            projects:
              type: array
              items:
                $ref: '#/components/schemas/Project'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    CreateProjectDto:
      type: object
      required: [name, customerId]
      properties:
        name:
          type: string
          example: Medical Image Annotation Q1
        description:
          type: string
        customerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProjectStatus'

    UpdateProjectDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'

    ProjectStatistics:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            totalTasks:
              type: integer
            completedTasks:
              type: integer
            inProgressTasks:
              type: integer
            pendingTasks:
              type: integer
            completionRate:
              type: number
              format: float
            averageQualityScore:
              type: number
              format: float

    AnnotationQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [TEXT, SINGLE_CHOICE, MULTIPLE_CHOICE, BOUNDING_BOX, POLYGON, RATING, BOOLEAN]
        label:
          type: string
        description:
          type: string
        required:
          type: boolean
        order:
          type: integer
        options:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              label:
                type: string
        config:
          type: object
          additionalProperties: true

    WorkflowConfiguration:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        annotatorsPerTask:
          type: integer
          default: 1
        reviewLevels:
          type: array
          items:
            type: object
            properties:
              level:
                type: integer
              reviewerRole:
                type: string
              qualityThreshold:
                type: number
        assignmentRules:
          type: object
          additionalProperties: true

    ConfigureWorkflowDto:
      type: object
      properties:
        annotatorsPerTask:
          type: integer
        reviewLevels:
          type: array
          items:
            type: object
            additionalProperties: true
        assignmentRules:
          type: object
          additionalProperties: true

    ProjectTeamMember:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
        quota:
          type: integer
        isActive:
          type: boolean
        assignedAt:
          type: string
          format: date-time

    AssignUserToProjectDto:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
        quota:
          type: integer
          description: Maximum tasks per day

    PluginDto:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [API, SCRIPT]
        config:
          type: object
          additionalProperties: true
        isEnabled:
          type: boolean
          default: true

    # -------------------------------------------------------------------------
    # Batches
    # -------------------------------------------------------------------------

    BatchStatus:
      type: string
      enum: [DRAFT, ACTIVE, IN_PROGRESS, COMPLETED, ARCHIVED]

    Batch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        projectId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/BatchStatus'
        taskCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    BatchResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Batch'

    CreateBatchDto:
      type: object
      required: [name, projectId]
      properties:
        name:
          type: string
          example: Batch 001 - Medical Images
        projectId:
          type: string
          format: uuid
        description:
          type: string

    UpdateBatchDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/BatchStatus'

    # -------------------------------------------------------------------------
    # Tasks
    # -------------------------------------------------------------------------

    TaskStatus:
      type: string
      enum:
        - QUEUED
        - ASSIGNED
        - IN_PROGRESS
        - SUBMITTED
        - IN_REVIEW
        - APPROVED
        - REJECTED
        - REWORK
        - COMPLETED
        - CANCELLED
      example: QUEUED

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TaskStatus'
        assignedUserId:
          type: string
          format: uuid
        workflowInstanceId:
          type: string
          format: uuid
        priority:
          type: integer
          default: 0
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Task'

    PaginatedTasks:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            tasks:
              type: array
              items:
                $ref: '#/components/schemas/Task'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    CreateTaskDto:
      type: object
      required: [projectId, batchId]
      properties:
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        priority:
          type: integer
          default: 0
        metadata:
          type: object
          additionalProperties: true

    UpdateTaskDto:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          type: integer
        metadata:
          type: object
          additionalProperties: true

    # -------------------------------------------------------------------------
    # Annotations
    # -------------------------------------------------------------------------

    Annotation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        annotatorId:
          type: string
          format: uuid
        data:
          type: object
          additionalProperties: true
        qualityScore:
          type: number
          minimum: 0
          maximum: 100
        version:
          type: integer
        submittedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SubmitReviewDto:
      type: object
      required: [decision, score]
      properties:
        decision:
          type: string
          enum: [APPROVE, REJECT, REQUEST_REVISION]
        score:
          type: number
          minimum: 0
          maximum: 100
        feedback:
          type: string
        annotationId:
          type: string
          format: uuid

    CreateQualityCheckDto:
      type: object
      required: [annotationId, checkType]
      properties:
        annotationId:
          type: string
          format: uuid
        checkType:
          type: string
          enum: [MANUAL, AUTOMATED, CONSENSUS]
        issues:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              severity:
                type: string
                enum: [LOW, MEDIUM, HIGH, CRITICAL]
              description:
                type: string

    CreateQualityRuleDto:
      type: object
      required: [name, ruleType, threshold]
      properties:
        name:
          type: string
        ruleType:
          type: string
        threshold:
          type: number
        config:
          type: object
          additionalProperties: true

    # -------------------------------------------------------------------------
    # Files
    # -------------------------------------------------------------------------

    FileStatus:
      type: string
      enum: [PENDING, UPLOADING, READY, FAILED, DELETED]

    FileRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
        fileSize:
          type: integer
          description: Size in bytes
        fileKey:
          type: string
          description: Storage key / path
        status:
          $ref: '#/components/schemas/FileStatus'
        uploadedBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    PaginatedFiles:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            files:
              type: array
              items:
                $ref: '#/components/schemas/FileRecord'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    PresignedUrlDto:
      type: object
      required: [fileName, mimeType, projectId]
      properties:
        fileName:
          type: string
          example: image_001.jpg
        mimeType:
          type: string
          example: image/jpeg
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid

    # -------------------------------------------------------------------------
    # Exports
    # -------------------------------------------------------------------------

    ExportStatus:
      type: string
      enum: [PENDING, PROCESSING, COMPLETED, FAILED, CANCELLED]

    ExportFormat:
      type: string
      enum: [JSON, CSV, COCO, PASCAL_VOC, YOLO, CUSTOM]

    ExportRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        format:
          $ref: '#/components/schemas/ExportFormat'
        status:
          $ref: '#/components/schemas/ExportStatus'
        fileUrl:
          type: string
          format: uri
          nullable: true
        requestedBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    PaginatedExports:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            exports:
              type: array
              items:
                $ref: '#/components/schemas/ExportRecord'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    CreateExportDto:
      type: object
      required: [projectId, format]
      properties:
        projectId:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        format:
          $ref: '#/components/schemas/ExportFormat'
        filters:
          type: object
          properties:
            status:
              $ref: '#/components/schemas/TaskStatus'
            dateFrom:
              type: string
              format: date
            dateTo:
              type: string
              format: date
        includeRejected:
          type: boolean
          default: false

    # -------------------------------------------------------------------------
    # Notifications
    # -------------------------------------------------------------------------

    NotificationRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    PaginatedNotifications:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            notifications:
              type: array
              items:
                $ref: '#/components/schemas/NotificationRecord'
            pagination:
              $ref: '#/components/schemas/PaginationMeta'

    CreateWebhookDto:
      type: object
      required: [projectId, url, events]
      properties:
        projectId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          example: https://yourapp.com/webhook
        events:
          type: array
          items:
            type: string
          example: [task.completed, annotation.submitted, export.completed]
        secret:
          type: string
          description: HMAC signing secret for payload verification
        isActive:
          type: boolean
          default: true

    UpdateWebhookDto:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        isActive:
          type: boolean

    # -------------------------------------------------------------------------
    # Analytics
    # -------------------------------------------------------------------------

    DashboardMetrics:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            totalProjects:
              type: integer
            activeProjects:
              type: integer
            totalTasks:
              type: integer
            completedTasks:
              type: integer
            totalAnnotators:
              type: integer
            averageQualityScore:
              type: number
            tasksCompletedToday:
              type: integer
            throughputByDay:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  count:
                    type: integer

